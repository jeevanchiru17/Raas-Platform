steps:
  # Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/raas-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/raas-frontend:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - './frontend'

  # Push backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/raas-backend:latest'

  # Push frontend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/raas-frontend:latest'

images:
  - 'gcr.io/$PROJECT_ID/raas-backend:latest'
  - 'gcr.io/$PROJECT_ID/raas-frontend:latest'

options:
  machineType: 'N1_HIGHCPU_8'

timeout: '1800s'
