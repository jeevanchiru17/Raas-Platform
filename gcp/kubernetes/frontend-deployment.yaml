apiVersion: apps/v1
kind: Deployment
metadata:
  name: raas-frontend
  labels:
    app: raas-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raas-frontend
  template:
    metadata:
      labels:
        app: raas-frontend
    spec:
      containers:
      - name: frontend
        image: gcr.io/PROJECT_ID/raas-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: raas-frontend-service
spec:
  selector:
    app: raas-frontend
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
