apiVersion: apps/v1
kind: Deployment
metadata:
  name: raas-backend
  labels:
    app: raas-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raas-backend
  template:
    metadata:
      labels:
        app: raas-backend
    spec:
      containers:
      - name: backend
        image: gcr.io/PROJECT_ID/raas-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: GOOGLE_CLOUD_PROJECT
          value: "PROJECT_ID"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/secrets/google/key.json"
        volumeMounts:
        - name: google-cloud-key
          mountPath: /var/secrets/google
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: google-cloud-key
        secret:
          secretName: gcp-key
---
apiVersion: v1
kind: Service
metadata:
  name: raas-backend-service
spec:
  selector:
    app: raas-backend
  ports:
  - port: 80
    targetPort: 5000
  type: LoadBalancer
